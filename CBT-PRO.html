<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHBHISHMA CBT PORTAL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f3f5;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.main{
display:flex;
min-height:calc(100vh - 60px);
}

.left{
width:75%;
padding:20px;
}

.right{
width:25%;
background:white;
padding:15px;
border-left:1px solid #ddd;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,.15);
}

.option{
display:block;
padding:12px;
margin:10px 0;
background:#f7f7f7;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#ececec;
}

.btn{
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

.prev{
background:#1976d2;
color:white;
}

.next{
background:#2e7d32;
color:white;
}

.review{
background:#fb8c00;
color:white;
}

.submit{
background:#d32f2f;
color:white;
}

.palette button{
width:40px;
height:40px;
margin:3px;
border:none;
border-radius:50%;
font-weight:bold;
cursor:pointer;
}

.notvisited{
background:#ddd;
}

.answered{
background:green;
color:white;
}

.reviewed{
background:orange;
color:white;
}

.current{
border:3px solid black;
}

.screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
padding:30px;
z-index:9999;
}

.box{
max-width:700px;
margin:auto;
margin-top:50px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input[type=text]{
width:100%;
padding:12px;
font-size:16px;
}

.startbtn{
padding:12px 25px;
background:#0b3d91;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div id="loginScreen" class="screen">

<div class="box">

<h1>TECHBHISHMA CBT PORTAL</h1>

<br>

<p>Candidate Name</p>

<br>

<input
type="text"
id="candidateName"
placeholder="Enter Candidate Name">

<br><br>

<button
class="startbtn"
onclick="showInstructions()">

Continue

</button>

</div>

</div>

<div
id="instructionScreen"
class="screen"
style="display:none;">

<div class="box">

<h2>Instructions</h2>

<br>

<ul>

<li>Total Questions : 50</li>

<li>Duration : 30 Minutes</li>

<li>Each Correct Answer = +1</li>

<li>Wrong Answer = -0.25</li>

<li>Do not refresh browser</li>

</ul>

<br>

<label>

<input
type="checkbox"
id="agree">

I have read all instructions

</label>

<br><br>

<button
class="startbtn"
onclick="startExam()">

Start Exam

</button>

</div>

</div>

<div class="header">

<h2>TECHBHISHMA CBT PORTAL</h2>

<h2 id="timer">30:00</h2>

</div>

<div class="main">

<div class="left">

<div class="card">

<h3 id="qno"></h3>

<br>

<h3 id="question"></h3>

<br>

<div id="options"></div>

<br>

<button
class="btn prev"
onclick="previousQuestion()">

Previous

</button>

<button
class="btn review"
onclick="markReview()">

Mark Review

</button>

<button
class="btn next"
onclick="nextQuestion()">

Save & Next

</button>

</div>

<br>

<button
class="btn submit"
onclick="submitTest()">

Submit Test

</button>

<div id="result"></div>

</div>

<div class="right">

<h3>Candidate</h3>

<p id="candidate">

Not Started

</p>

<hr><br>

<h3>Question Palette</h3>

<div
id="palette"
class="palette">

</div>

</div>

</div>
  <script>

const questions = [

{
question:"In which city is Kanaka Durga Temple located?",
options:["Tirupati","Vijayawada","Visakhapatnam","Guntur"],
answer:1
},
{
question:"Tirupati Balaji Temple is located in which state?",
options:["Telangana","Tamil Nadu","Andhra Pradesh","Karnataka"],
answer:2
},
{
question:"Kamakhya Temple is situated in:",
options:["Assam","Odisha","Bihar","Kerala"],
answer:0
},
{
question:"Akshardham Temple is located in which city?",
options:["Mumbai","Delhi","Jaipur","Lucknow"],
answer:1
},
{
question:"Somnath Temple is situated in which state?",
options:["Rajasthan","Gujarat","Maharashtra","Punjab"],
answer:1
},
{
question:"Amarnath Cave Temple is located in:",
options:["Himachal Pradesh","Uttarakhand","Jammu & Kashmir","Punjab"],
answer:2
},
{
question:"Vaishno Devi Temple is located at:",
options:["Srinagar","Jammu & Kashmir","Leh","Shimla"],
answer:1
},
{
question:"Angrabadi Temple is situated in which state?",
options:["Bihar","Jharkhand","Chhattisgarh","Odisha"],
answer:1
},
{
question:"Virupaksha Temple is located in:",
options:["Hampi","Mysuru","Bengaluru","Hubli"],
answer:0
},
{
question:"Sabarimala Temple is in which state?",
options:["Karnataka","Tamil Nadu","Kerala","Andhra Pradesh"],
answer:2
},
{
question:"Sanchi Stupa is located in:",
options:["Uttar Pradesh","Madhya Pradesh","Bihar","Rajasthan"],
answer:1
},
{
question:"Shirdi Sai Baba Temple is situated in which state?",
options:["Maharashtra","Gujarat","Punjab","Haryana"],
answer:0
},
{
question:"Siddhivinayak Temple is located in:",
options:["Pune","Nashik","Mumbai","Nagpur"],
answer:2
},
{
question:"Konark Sun Temple is situated in which state?",
options:["Odisha","Assam","Bihar","West Bengal"],
answer:0
},
{
question:"Jagannath Temple is located in:",
options:["Bhubaneswar","Puri","Cuttack","Rourkela"],
answer:1
},
{
question:"Golden Temple is situated in which city?",
options:["Ludhiana","Jalandhar","Amritsar","Patiala"],
answer:2
},
{
question:"Brihadeeswara Temple is located in:",
options:["Madurai","Thanjavur","Chennai","Coimbatore"],
answer:1
},
{
question:"Meenakshi Temple is situated in which city?",
options:["Madurai","Tirunelveli","Salem","Erode"],
answer:0
},
{
question:"Ramanathaswamy Temple is located at:",
options:["Kanyakumari","Rameswaram","Madurai","Trichy"],
answer:1
},
{
question:"ISKCON Temple (listed in your notes) is located in:",
options:["Vrindavan","Mathura","Agra","Kanpur"],
answer:0
},
{
question:"Kashi Vishwanath Temple is situated in:",
options:["Prayagraj","Ayodhya","Varanasi","Gorakhpur"],
answer:2
},
{
question:"Badrinath Temple is located in which state?",
options:["Himachal Pradesh","Uttarakhand","Jammu & Kashmir","Sikkim"],
answer:1
},
{
question:"Kedarnath Temple is situated in:",
options:["Uttarakhand","Uttar Pradesh","Bihar","Rajasthan"],
answer:0
},
{
question:"Kalighat Mandir is located in which city?",
options:["Kolkata","Siliguri","Durgapur","Asansol"],
answer:0
},
{
question:"Kumbakonam Temples are situated in which state?",
options:["Karnataka","Kerala","Tamil Nadu","Andhra Pradesh"],
answer:2
}
,
{
question:"Lingaraja Temple is located in which city?",
options:["Puri","Bhubaneswar","Cuttack","Sambalpur"],
answer:1
},
{
question:"Mahakaleshwar Jyotirlinga is situated in:",
options:["Ujjain","Indore","Bhopal","Gwalior"],
answer:0
},
{
question:"Dwarkadhish Temple is located in which state?",
options:["Rajasthan","Maharashtra","Gujarat","Punjab"],
answer:2
},
{
question:"Sri Padmanabhaswamy Temple is situated in:",
options:["Kochi","Thrissur","Thiruvananthapuram","Kozhikode"],
answer:2
},
{
question:"Yadadri Lakshmi Narasimha Temple is located in which state?",
options:["Andhra Pradesh","Tamil Nadu","Telangana","Karnataka"],
answer:2
  }
];

let current = 0;

let answers =
new Array(questions.length).fill(null);

let review =
new Array(questions.length).fill(false);

function showInstructions(){

let name =
document.getElementById(
"candidateName"
).value;

if(name==""){

alert("Enter Name");

return;

}

document.getElementById(
"candidate"
).innerHTML=name;

document.getElementById(
"loginScreen"
).style.display="none";

document.getElementById(
"instructionScreen"
).style.display="block";

}

function startExam(){

if(
!document.getElementById(
"agree"
).checked
){

alert(
"Accept Instructions"
);

return;

}

document.getElementById(
"instructionScreen"
).style.display="none";

loadQuestion();

}
function buildPalette(){

let html="";

for(
let i=0;
i<questions.length;
i++
){

html +=

`<button
id="p${i}"
onclick="gotoQuestion(${i})"
class="notvisited">

${i+1}

</button>`;

}

document.getElementById(
"palette"
).innerHTML = html;

}

function loadQuestion(){

let q =
questions[current];

document.getElementById(
"qno"
).innerHTML =

"Question " +
(current+1) +
" of " +
questions.length;

document.getElementById(
"question"
).innerHTML =
q.question;

let html="";

q.options.forEach((o,i)=>{

let checked =

answers[current]===i
?
"checked"
:
"";

html +=

`<label class="option">

<input
type="radio"
name="ans"
value="${i}"
${checked}
>

${o}

</label>`;

});

document.getElementById(
"options"
).innerHTML = html;

updatePalette();

}

function saveAnswer(){

let selected =

document.querySelector(
'input[name="ans"]:checked'
);

if(selected){

answers[current] =

parseInt(
selected.value
);

}

}

function nextQuestion(){

saveAnswer();

if(
current <
questions.length-1
){

current++;

loadQuestion();

}

}

function previousQuestion(){

saveAnswer();

if(current>0){

current--;

loadQuestion();

}

}

function gotoQuestion(i){

saveAnswer();

current=i;

loadQuestion();

}

function markReview(){

review[current]=true;

updatePalette();

    }
    function updatePalette(){

for(
let i=0;
i<questions.length;
i++
){

let btn =

document.getElementById(
"p"+i
);

btn.className="";

if(review[i]){

btn.classList.add(
"reviewed"
);

}
else if(
answers[i]!=null
){

btn.classList.add(
"answered"
);

}
else{

btn.classList.add(
"notvisited"
);

}

if(i===current){

btn.classList.add(
"current"
);

}

}

}

let timeLeft = 1800;

setInterval(()=>{

if(timeLeft>0){

timeLeft--;

let m =

Math.floor(
timeLeft/60
);

let s =
timeLeft%60;

document.getElementById(
"timer"
).innerHTML =

String(m)
.padStart(2,"0")

+ ":"

+

String(s)
.padStart(2,"0");

}
else{

submitTest();

}

},1000);

function submitTest(){

saveAnswer();

let correct=0;

let wrong=0;

let unanswered=0;

for(
let i=0;
i<questions.length;
i++
){

if(
answers[i]==null
){

unanswered++;

}
else if(

answers[i]
===
questions[i].answer

){

correct++;

}
else{

wrong++;

}

}

let score =

correct -
(wrong*0.25);

let percent =

(
(correct/
questions.length)
*100
).toFixed(2);

document.getElementById(
"result"
).innerHTML =

`

<hr>

<h2>
TEST RESULT
</h2>

<p>
Correct :
${correct}
</p>

<p>
Wrong :
${wrong}
</p>

<p>
Unanswered :
${unanswered}
</p>

<p>
Score :
${score.toFixed(2)}
</p>

<p>
Percentage :
${percent}%
</p>

`;

}

buildPalette();

loadQuestion();
    </script>

</body>
</html>
