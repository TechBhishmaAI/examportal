value="${index}"

`;

});

}

function submitTest(){

let attempted = 0;
let right = 0;
let wrong = 0;

for(let i=0;i<questions.length;i++){

if(answers[i] !== null){

attempted++;

if(answers[i] === questions[i].answer){

right++;

}else{

wrong++;

}

}

}

let notAttempted =
questions.length - attempted;

let finalMarks =
right - (wrong * 0.25);

document.body.innerHTML = `

padding:40px;
