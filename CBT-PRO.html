<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRB CBT Mock Test</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f3f5;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.main{
display:flex;
height:calc(100vh - 60px);
}

.left{
width:75%;
padding:20px;
overflow:auto;
}

.right{
width:25%;
background:white;
border-left:1px solid #ddd;
padding:15px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.15);
}

.option{
display:block;
padding:12px;
margin:10px 0;
background:#f7f7f7;
border-radius:5px;
}

.btn{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.prev{background:#1976d2;color:white;}
.next{background:#2e7d32;color:white;}
.review{background:#fb8c00;color:white;}
.submit{background:#d32f2f;color:white;}

.palette button{
width:42px;
height:42px;
margin:3px;
border:none;
border-radius:50%;
font-weight:bold;
}

.notvisited{background:#ddd;}
.answered{background:green;color:white;}
.reviewed{background:orange;color:white;}
.current{border:3px solid black;}

.legend div{
margin:8px 0;
}

</style>
</head>

<body>

<div class="header">
<div>
<b>RRB CBT MOCK TEST</b>
</div>

<div id="timer">
30:00
</div>
</div>

<div class="main">

<div class="left">

<div class="card">

<h3 id="qno"></h3>

<h3 id="question"></h3>

<div id="options"></div>

<button class="btn prev">Previous</button>

<button class="btn review">
Mark For Review
</button>

<button class="btn next">
Save & Next
</button>

</div>

<br>

<button class="btn submit">
Submit Test
</button>

<div id="result"></div>

</div>

<div class="right">

<h3>Candidate</h3>

<p id="candidate">
KONDA SHARATH
</p>

<hr>

<h3>Question Palette</h3>

<div id="palette" class="palette">
</div>

<hr>

<div class="legend">

<div>🟢 Answered</div>

<div>🟠 Review</div>

<div>⚪ Not Visited</div>

</div>

</div>

</div>

<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;padding:30px;z-index:9999">

<h2>RRB CBT MOCK TEST</h2>

<p>Candidate Name</p>

<input type="text" id="candidateName"
style="padding:10px;width:300px;max-width:90%;">

<br><br>

<button onclick="showInstructions()">
Continue
</button>

</div>

<div id="instructionScreen"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:white;padding:25px;z-index:9998">

<h2>Instructions</h2>

<ul>
<li>Total Questions : 50</li>
<li>Duration : 30 Minutes</li>
<li>Each Correct Answer = +1</li>
<li>Wrong Answer = -0.25</li>
<li>Do not refresh browser</li>
</ul>

<label>
<input type="checkbox" id="agree">
I have read all instructions
</label>

<br><br>

<button onclick="startExam()">
Start Exam
</button>

</div>
  <script>

function showInstructions(){

let name=
document.getElementById("candidateName").value;

if(name==""){
alert("Enter Candidate Name");
return;
}

document.getElementById("candidate")
.innerHTML=name;

document.getElementById("loginScreen")
.style.display="none";

document.getElementById("instructionScreen")
.style.display="block";

}

function startExam(){

if(!document.getElementById("agree").checked){

alert("Accept instructions first");

return;

}

document.getElementById("instructionScreen")
.style.display="none";

}

  </script>
</body>
</html>
