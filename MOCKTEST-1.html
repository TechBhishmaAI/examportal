<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CBT Mock Test</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f1f3f6;
}

.header{
background:#003366;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:flex;
}

.left{
width:75%;
padding:20px;
}

.right{
width:25%;
background:white;
padding:15px;
border-left:2px solid #ddd;
}

.question-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

.option{
display:block;
padding:10px;
margin:10px 0;
background:#f8f8f8;
border-radius:5px;
}

.btn{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.next{
background:#28a745;
color:white;
}

.prev{
background:#007bff;
color:white;
}

.review{
background:#ff9800;
color:white;
}

.submit{
background:red;
color:white;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:50%;
cursor:pointer;
}

.notvisited{
background:#ddd;
}

.answered{
background:green;
color:white;
}

.reviewed{
background:orange;
color:white;
}

.current{
border:3px solid black;
}
</style>

</head>

<body>

<div class="header">
<h2>MOCK TEST - 1</h2>
<h2 id="timer">30:00</h2>
</div>

<div class="container">

<div class="left">

<div class="question-box">
<h3 id="qno"></h3>
<h3 id="question"></h3>

<div id="options"></div>

<button class="btn prev" onclick="previousQuestion()">Previous</button>
<button class="btn review" onclick="markReview()">Mark Review</button>
<button class="btn next" onclick="nextQuestion()">Next</button>

</div>

<button class="btn submit" onclick="submitTest()">Submit Test</button>

<h2 id="result"></h2>

</div>

<div class="right">
<h3>Question Palette</h3>
<div id="palette" class="palette"></div>
</div>

</div>

<script>

let current=0;
let score=0;

const questions=[
  {
question:"25 + 5 × 4 = ?",
options:["120","45","40","50"],
answer:1
},
{
question:"36 ÷ 6 × 3 = ?",
options:["18","6","12","24"],
answer:0
},
{
question:"20% of 250 = ?",
options:["40","50","60","70"],
answer:1
},
{
question:"Facing North, turn right. Facing?",
options:["West","South","East","North"],
answer:2
},
{
question:"Walk 5 km East then 5 km West. Position?",
options:["5 km East","Start Point","5 km West","North"],
answer:1
}
];
  let answers=new Array(questions.length).fill(null);
let review=new Array(questions.length).fill(false);

function buildPalette(){
let html="";
for(let i=0;i<questions.length;i++){
html+=`<button id="p${i}" onclick="gotoQuestion(${i})" class="notvisited">${i+1}</button>`;
}
document.getElementById("palette").innerHTML=html;
}

function loadQuestion(){

let q=questions[current];

document.getElementById("qno").innerHTML=
"Question "+(current+1)+" of "+questions.length;

document.getElementById("question").innerHTML=q.question;

let html="";

q.options.forEach((o,i)=>{
let checked=answers[current]==i?"checked":"";
html+=`
<label class="option">
<input type="radio" name="ans" value="${i}" ${checked}>
${o}
</label>`;
});

document.getElementById("options").innerHTML=html;

updatePalette();
}

function saveAnswer(){
let selected=document.querySelector('input[name="ans"]:checked');
if(selected){
answers[current]=parseInt(selected.value);
}
}

function nextQuestion(){
saveAnswer();
if(current<questions.length-1){
current++;
loadQuestion();
}
}

function previousQuestion(){
saveAnswer();
if(current>0){
current--;
loadQuestion();
}
}

function gotoQuestion(i){
saveAnswer();
current=i;
loadQuestion();
}

function markReview(){
review[current]=true;
updatePalette();
}

function updatePalette(){
for(let i=0;i<questions.length;i++){
let btn=document.getElementById("p"+i);

btn.className="";

if(review[i]){
btn.classList.add("reviewed");
}
else if(answers[i]!=null){
btn.classList.add("answered");
}
else{
btn.classList.add("notvisited");
}

if(i===current){
btn.classList.add("current");
}
}
}

function submitTest(){

saveAnswer();

let score=0;

for(let i=0;i<questions.length;i++){
if(answers[i]===questions[i].answer){
score++;
}
}

let percent=((score/questions.length)*100).toFixed(2);

document.getElementById("result").innerHTML=
"Score: "+score+"/"+questions.length+
"<br>Percentage: "+percent+"%";
}

let timeLeft=1800;

setInterval(()=>{
if(timeLeft>0){
timeLeft--;
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}else{
submitTest();
}
},1000);

buildPalette();
loadQuestion();

</script>
</body>
</html>
